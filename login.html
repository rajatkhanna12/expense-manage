<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FinFlow — Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="style.css?v=3.0">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem;">

    <div class="lock-container">
        <div class="lock-logo">
            <i class="fa-solid fa-scale-balanced"></i>
        </div>
        <h2 id="lockTitle">Login to FinFlow</h2>
        <p id="lockSubtitle">Enter your credentials to access your logs</p>
        
        <!-- Auth Form -->
        <form id="authForm" style="width: 100%; max-width: 280px; margin: 0 auto; display: flex; flex-direction: column; gap: 0.85rem;">
            <div class="lock-input-group">
                <input type="text" id="authUsername" placeholder="Enter Username" required
                       style="width: 100%; padding: 0.75rem 1rem; border-radius: var(--radius-sm); border: 1px solid var(--border-color); font-family: inherit; font-size: 0.95rem; font-weight: 600; text-align: center; outline: none; transition: var(--transition-fast); background: rgba(255, 255, 255, 0.75); box-shadow: var(--shadow-sm);">
            </div>

            <div class="lock-input-group">
                <input type="password" id="authPassword" placeholder="Enter Password" required
                       style="width: 100%; padding: 0.75rem 1rem; border-radius: var(--radius-sm); border: 1px solid var(--border-color); font-family: inherit; font-size: 0.95rem; font-weight: 600; text-align: center; outline: none; transition: var(--transition-fast); background: rgba(255, 255, 255, 0.75); box-shadow: var(--shadow-sm);">
            </div>
            
            <div id="staticHostWarning" style="display: none; width: 100%; font-size: 0.75rem; text-align: left; background: rgba(245, 158, 11, 0.08); border: 1px solid rgba(245, 158, 11, 0.2); padding: 0.75rem; border-radius: var(--radius-sm); color: #B45309; box-sizing: border-box;">
                <p style="margin: 0 0 0.4rem 0; font-weight: 700;"><i class="fa-solid fa-triangle-exclamation"></i> Static Hosting Detected</p>
                <p style="margin: 0 0 0.6rem 0; font-size: 0.7rem; line-height: 1.4;">GitHub Pages is static. Please enter your deployed backend URL to connect your database, or open your backend URL directly.</p>
                <input type="text" id="authBackendUrl" placeholder="https://your-app.onrender.com" 
                       style="width: 100%; padding: 0.45rem 0.65rem; border-radius: var(--radius-sm); border: 1px solid rgba(245, 158, 11, 0.3); font-family: inherit; font-size: 0.8rem; outline: none; background: #FFF; box-shadow: var(--shadow-sm); box-sizing: border-box;">
            </div>

            <button type="submit" id="btnAuthSubmit" class="btn-submit" style="margin-top: 0.25rem;">
                <i class="fa-solid fa-right-to-bracket"></i> Login
            </button>
        </form>
        
        <div class="lock-footer" id="lockFooterMessage" style="margin-top: 0.5rem; text-align: center; font-size: 0.85rem;"></div>

        <!-- Toggle Auth Mode (Register vs Login) -->
        <div class="auth-toggle-container" style="margin-top: 1rem; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); text-align: center;">
            <span id="authToggleLabel">New user?</span>
            <a href="javascript:void(0)" id="authToggleLink" onclick="toggleAuthMode()" style="color: var(--primary); text-decoration: none; margin-left: 0.25rem; border-bottom: 1px dashed var(--primary);">Create Account</a>
        </div>
    </div>

    <!-- Central Utilities & Login Handler -->
    <script src="common.js"></script>
    <script src="login.js"></script>
</body>
</html>
