<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FinFlow — Redirecting...</title>
    <script>
        const token = localStorage.getItem('finflow_token');
        if (token) {
            window.location.replace('dashboard.html');
        } else {
            window.location.replace('login.html');
        }
    </script>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: #F8FAFC; color: #475569; margin: 0;">
    <div style="text-align: center;">
        <h2 style="font-weight: 600; margin-bottom: 0.5rem;">Connecting to FinFlow...</h2>
        <p style="font-size: 0.9rem; margin-top: 0;">If you are not redirected, please click <a href="login.html" style="color: #4F46E5; text-decoration: none; font-weight: 600;">here</a>.</p>
    </div>
</body>
</html>
