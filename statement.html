<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FinFlow — Account Statement</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="style.css?v=3.0">
</head>
<body style="padding: 2rem 1.5rem;">

    <div class="form-container-page" style="max-width: 800px; margin: 0 auto;">
        <div class="form-header-row">
            <a href="dashboard.html" class="btn-back" style="text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;">
                <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
            </a>
            <h2 id="statementAccountName">Account Statement</h2>
        </div>
        
        <!-- Account Summary Mini-KPI Cards -->
        <div class="kpi-row" style="margin-bottom: 1.5rem;">
            <div class="kpi-card income" style="padding: 1rem 1.25rem;">
                <div class="kpi-icon" style="width: 40px; height: 40px; font-size: 1.1rem;"><i class="fa-solid fa-arrow-trend-up"></i></div>
                <div class="kpi-details">
                    <span class="kpi-label" style="font-size: 0.65rem;">Total Inflow</span>
                    <h3 id="lblStatementInflow" style="font-size: 1.3rem;">₹0.00</h3>
                </div>
            </div>
            <div class="kpi-card expense" style="padding: 1rem 1.25rem;">
                <div class="kpi-icon" style="width: 40px; height: 40px; font-size: 1.1rem;"><i class="fa-solid fa-arrow-trend-down"></i></div>
                <div class="kpi-details">
                    <span class="kpi-label" style="font-size: 0.65rem;">Total Outflow</span>
                    <h3 id="lblStatementOutflow" style="font-size: 1.3rem;">₹0.00</h3>
                </div>
            </div>
            <div class="kpi-card savings" style="padding: 1rem 1.25rem;">
                <div class="kpi-icon" style="width: 40px; height: 40px; font-size: 1.1rem;"><i class="fa-solid fa-wallet"></i></div>
                <div class="kpi-details">
                    <span class="kpi-label" style="font-size: 0.65rem;">Current Balance</span>
                    <h3 id="lblStatementBalance" style="font-size: 1.3rem;">₹0.00</h3>
                </div>
            </div>
        </div>

        <!-- Statement List Card -->
        <div class="card">
            <div class="card-header">
                <h3><i class="fa-solid fa-file-invoice-dollar"></i> Transaction History</h3>
            </div>
            <div class="logs-list-wrapper" style="max-height: 500px;">
                <div class="empty-state" id="statementEmptyState" style="display: none;">
                    <div class="empty-icon"><i class="fa-solid fa-circle-info"></i></div>
                    <p>No transactions found for this account.</p>
                </div>
                <div class="simple-logs-list" id="statementLogsList">
                    <!-- Populated dynamically -->
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- JS Logic -->
    <script src="common.js"></script>
    <script src="statement.js"></script>
</body>
</html>
